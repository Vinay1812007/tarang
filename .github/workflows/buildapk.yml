name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION_CODE: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install JS deps
        run: if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi

      - name: Build web bundle
        run: npm run build

      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }

      - uses: android-actions/setup-android@v3

      - name: Scaffold Android
        run: |
          if [ ! -d android ]; then
            npx --yes cap add android
          fi

      - name: Verify plugins
        run: |
          [ -d node_modules/@jofr/capacitor-media-session ] || { echo "media-session MISSING"; exit 1; }
          [ -d node_modules/@capacitor/app ] || { echo "@capacitor/app MISSING"; exit 1; }
          [ -d node_modules/@capacitor/local-notifications ] || { echo "local-notifications MISSING"; exit 1; }

      - name: Install native media service (VinaX's own MediaSession)
        run: |
          PKGDIR=$(dirname "$(find android/app/src/main/java -name MainActivity.java | head -1)")
          PKG=$(grep -m1 '^package' "$PKGDIR/MainActivity.java" | sed 's/package \(.*\);/\1/')
          echo "installing native media into $PKGDIR (package $PKG)"
          for f in native-android/VinaxMediaPlugin.java native-android/VinaxMediaService.java; do
            sed "s/__PKG__/$PKG/" "$f" > "$PKGDIR/$(basename "$f")"
          done
          # androidx.media (MediaSessionCompat + MediaStyle + MediaButtonReceiver)
          grep -q "androidx.media:media" android/app/build.gradle || \
            sed -i 's|dependencies {|dependencies {\n    implementation "androidx.media:media:1.7.0"|' android/app/build.gradle
          ls "$PKGDIR"

      - name: Install VinaX launcher icons
        run: |
          cp -r android-res/* android/app/src/main/res/
          test -f android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Verify Capacitor plugins are registered
        run: |
          P=android/app/src/main/assets/capacitor.plugins.json
          cat "$P"
          for plugin in LocalNotifications Haptics; do
            grep -q "$plugin" "$P" || { echo "::error::$plugin missing from $P"; exit 1; }
          done

      - name: Patch AndroidManifest
        run: |
          MAN=android/app/src/main/AndroidManifest.xml
          if ! grep -q FOREGROUND_SERVICE_MEDIA_PLAYBACK "$MAN"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />\n</manifest>|' "$MAN"
          fi
          if ! grep -q 'windowSoftInputMode' "$MAN"; then
            sed -i 's|android:exported="true">|android:exported="true"\n            android:windowSoftInputMode="adjustResize">|' "$MAN"
          fi
          if ! grep -q 'VinaxMediaService' "$MAN"; then
            sed -i 's|</application>|    <service android:name=".VinaxMediaService" android:exported="false" android:foregroundServiceType="mediaPlayback" />\n    <receiver android:name="androidx.media.session.MediaButtonReceiver" android:exported="true">\n        <intent-filter><action android:name="android.intent.action.MEDIA_BUTTON" /></intent-filter>\n    </receiver>\n</application>|' "$MAN"
          fi
          grep -c uses-permission "$MAN"

      - name: Patch MainActivity
        run: |
          MAIN=$(find android/app/src/main/java -name 'MainActivity.java' | head -1)
          PKG=$(grep -m1 '^package' "$MAIN" | sed 's/package \(.*\);/\1/')
          echo "patching $MAIN (package $PKG)"
          cat > "$MAIN" <<JAVA
          package $PKG;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              private static final int REQ_NOTIFY = 4242;
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(VinaxMediaPlugin.class);
                  super.onCreate(savedInstanceState);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.POST_NOTIFICATIONS}, REQ_NOTIFY);
                      }
                  }
              }
          }
          JAVA
          cat "$MAIN"

      - name: Set versionCode + versionName + minSdk
        run: |
          VARS=android/variables.gradle
          sed -i "s/minSdkVersion = .*/minSdkVersion = 23/" "$VARS" || true
          BUILD=android/app/build.gradle
          VC=${VERSION_CODE:-1}
          VN=$(node -p "require('./package.json').version")
          sed -i "s/versionCode [0-9]\+/versionCode $VC/" "$BUILD"
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VN\"/" "$BUILD"
          grep -E 'versionCode|versionName' "$BUILD"

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify merged manifest (service + media permissions)
        run: |
          M=$(find android/app/build/intermediates/merged_manifests -name AndroidManifest.xml | head -1)
          echo "merged manifest: $M"
          for needle in VinaxMediaService POST_NOTIFICATIONS FOREGROUND_SERVICE_MEDIA_PLAYBACK WAKE_LOCK mediaPlayback; do
            grep -q "$needle" "$M" || { echo "::error::$needle missing from merged manifest"; exit 1; }
            echo "OK: $needle"
          done

      - name: Rename APK
        run: mkdir -p out && cp android/app/build/outputs/apk/debug/app-debug.apk out/vinax-debug.apk

      - uses: actions/upload-artifact@v4
        with: { name: vinax-debug-apk, path: out/vinax-debug.apk }

      # ---- Signed release (consistent key -> updates install over the top) ----
      - name: Detect keystore availability
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "HAS_KEYSTORE=$([ -n "$KS" ] && echo true || echo false)" >> "$GITHUB_ENV"

      - name: Decode keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.jks

      - name: Build signed release APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/release.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Prepare release assets
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          V=$(node -p "require('./package.json').version")
          echo "APP_VERSION=$V" >> "$GITHUB_ENV"
          cp android/app/build/outputs/apk/release/app-release.apk vinax.apk
          ls -lh vinax.apk

      - name: Publish GitHub Release (public APK download)
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build${{ github.run_number }}
          name: VinaX v${{ env.APP_VERSION }} (build ${{ github.run_number }})
          make_latest: true
          files: vinax.apk
          body: |
            Signed VinaX Android APK. Install over the previous version — no uninstall needed.
