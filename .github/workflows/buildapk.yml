name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build web app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Add Android platform (generated in CI, not committed)
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install Tarang launcher icons
        run: |
          cp -rv android-res/* android/app/src/main/res/
          test -f android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Verify Capacitor plugins are registered
        run: |
          P=android/app/src/main/assets/capacitor.plugins.json
          cat "$P"
          for plugin in MediaSession LocalNotifications Haptics; do
            grep -q "$plugin" "$P" || { echo "::error::$plugin missing from $P"; exit 1; }
          done

      - name: Patch AndroidManifest (media notification + Bluetooth controls)
        run: |
          M=android/app/src/main/AndroidManifest.xml
          python3 - "$M" <<'PY'
          import sys
          path = sys.argv[1]
          s = open(path).read()
          perms = [
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.WAKE_LOCK',
              'android.permission.FOREGROUND_SERVICE',
              'android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK',
          ]
          add = ''.join(
              f'    <uses-permission android:name="{p}" />\n'
              for p in perms if p not in s
          )
          s = s.replace('<application', add + '    <application', 1)
          open(path, 'w').write(s)
          print('permissions present:', sum(p in s for p in perms), '/', len(perms))
          PY

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Verify debug APK exists
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          if [ ! -f "$APK" ]; then
            echo "::error::Debug APK missing at $APK — build failed silently"
            exit 1
          fi
          ls -lh "$APK"

      # ---- Optional signed release build -------------------------------
      # Provide these repository secrets to enable it:
      #   ANDROID_KEYSTORE_BASE64  – base64 of your .jks keystore
      #   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      - name: Detect keystore availability
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "HAS_KEYSTORE=$([ -n "$KS" ] && echo true || echo false)" >> "$GITHUB_ENV"

      - name: Decode keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.jks

      - name: Build signed release APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/release.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vinax-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: vinax-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
